services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_tattoo_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - api_tattoo
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: api_tattoo_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - api_tattoo
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: api_tattoo_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-api_tattoo}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-api_tattoo}
    ports:
      - "3307:3306"
    volumes:
      - api_tattoo_mysql:/var/lib/mysql
    networks:
      - api_tattoo

  redis:
    image: redis:alpine
    container_name: api_tattoo_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - api_tattoo

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api_tattoo_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    command: php artisan queue:listen --tries=3 --timeout=90
    networks:
      - api_tattoo
    depends_on:
      - mysql
      - redis

networks:
  api_tattoo:
    driver: bridge

volumes:
  api_tattoo_mysql:
    driver: local
